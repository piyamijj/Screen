<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Kullanıcının sayfayı yanlışlıkla yakınlaştırmasını (zoom) engelliyoruz -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Derinlikli Akvaryum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Sensör izni için Başlangıç Ekranı -->
    <div id="start-screen">
        <h1>Derinliklere Dal</h1>
        <p>3D Derinlik ve Sensörleri aktif etmek için dokunun</p>
        <button id="start-btn">Suya Gir</button>
    </div>

    <!-- Three.js kütüphanesini içeri aktarma (Modern ES Module yöntemi) -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    
    <!-- Ana kodumuz -->
    <script type="module" src="script.js"></script>
    
</body>
</html>
